# ---------------------------------------------------------------------------
# RELEASE BUILDS — push a version tag (v0.2.0) and this attaches a Windows
# installer + a Linux AppImage (the Steam Deck artifact) to that GitHub
# Release. electron-builder's github publisher does the uploading; the tag
# should match package.json's version (bump it in the same commit you tag).
#
# Manual runs (workflow_dispatch) build the same artifacts and stash them as
# workflow artifacts instead of publishing — a dry run for the pipeline.
# ---------------------------------------------------------------------------
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # electron-builder uploads release assets

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win
          - os: ubuntu-latest
            args: --linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Same pipeline as `npm run dist`, split so CI logs separate the stages.
      - run: npm run build
      - run: node scripts/make-build-info.mjs

      # Uploads land on a DRAFT release (electron-builder.yml releaseType),
      # where same-name assets are replaced — so one retry after a transient
      # CDN/API hiccup (the 504 that sank v0.2.0's first run) is safe.
      - name: Package (and publish on tag builds)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH: ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        run: |
          npx electron-builder ${{ matrix.args }} --publish "$PUBLISH" || {
            echo "electron-builder failed — retrying once in 20s (transient network errors)…"
            sleep 20
            npx electron-builder ${{ matrix.args }} --publish "$PUBLISH"
          }

      - name: Stash artifacts (manual dry runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.AppImage
          if-no-files-found: error

  # Both legs upload into a DRAFT (electron-builder.yml releaseType) — this
  # job is what actually ships it: stamp a human title + notes (curated
  # docs/releases/<tag>.md when the repo carries them, else GitHub's
  # auto-generated commit list), then flip the draft public and mark it
  # latest. It runs only when every leg succeeded, so /releases/latest —
  # the launcher's update probe — never serves a partial release.
  finalize:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish the draft with title + notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # GET /releases/tags/:tag hides drafts — find ours in the list.
          id="$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=30" \
                --jq ".[] | select(.tag_name == \"$TAG\") | .id" | head -n1)"
          if [ -z "$id" ]; then echo "no release found for tag $TAG"; exit 1; fi
          if [ -f "docs/releases/${TAG}.md" ]; then
            notes="$(cat "docs/releases/${TAG}.md")"
          else
            notes="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" -f tag_name="$TAG" --jq .body)"
          fi
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/$id" \
            -f name="Hollow Wake $TAG" -f body="$notes" \
            -F draft=false -f make_latest=true
