name: Deploy site to GitHub Pages

# Regenerates the site's data from src/data on every push, then deploys.
# This is what keeps the Database (and later the Passive Tree) at parity with
# the game: the JSON is never committed by hand — it's rebuilt here each time.

on:
  push:
    branches: [main]
    # Rebuild when the game data, the site, or the pipeline changes.
    paths:
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'vite.portraits.config.ts'
      - 'site/**'
      - 'scripts/export-web-data.ts'
      - '.github/workflows/pages.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export game data → site/data/*.json
        run: npx tsx scripts/export-web-data.ts

      # The database page's monster portraits: the game's own painters
      # (render/vis/portrait.ts + the part grammar + LOOKS), bundled as one
      # iife the page loads beside the JSON — site pixels regenerate from
      # src/ on every deploy exactly like site facts do.
      - name: Build the portrait bundle → site/assets/portraits.js
        run: npx vite build --config vite.portraits.config.ts

      # --- Phase 3: the playable in-browser demo, built into site/play ---
      # The game is a static Vite build; --base=./ keeps hashed asset URLs
      # relative so they resolve at the /arpg-game-world/play/ sub-path.
      # Uses `npx vite build` directly (not `npm run build`) to skip the tsc
      # gate — esbuild does no type-checking, so the demo deploys regardless of
      # in-flight type state. Saves fall back to localStorage on this static
      # host (no /__save endpoint) — see src/meta/persistence.ts.
      - name: Build the in-browser demo → site/play
        run: npx vite build --base=./ --outDir site/play --emptyOutDir

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
