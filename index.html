<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hollow Wake</title>
  <style>
    :root {
      --panel-bg: rgba(12, 12, 18, 0.92);
      --panel-border: #3a3a52;
      --gold: #c8a84b;
      --text: #d8d4c8;
      --text-dim: #8a8678;
      /* THE UI SCALE DIAL (ui/uiScale.ts stamps this live; 1 = 100%). Zoomed
         surfaces resolve vw/vh caps in layout px and then multiply, so a cap
         that means "of the SCREEN" must fold the dial back out: write
         `calc(94vw / var(--ui-scale))`, never a bare `94vw`, on any
         panel/popup max-width/max-height. */
      --ui-scale: 1;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #0a0a0e; overflow: hidden;
      font-family: 'Segoe UI', Verdana, sans-serif;
      color: var(--text);
      user-select: none;
    }
    /* Nothing in the game is ever a native drag source — a stray drag ghost
       "grabs the window" (input.ts suppresses dragstart too; this is the
       belt-and-suspenders layer for any future <img> content). */
    img, svg, canvas { -webkit-user-drag: none; }
    #game { display: block; width: 100vw; height: 100vh; }

    .panel {
      position: absolute;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      padding: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.7);
    }
    .panel h2 {
      margin: 0 0 10px 0; font-size: 15px; color: var(--gold);
      text-transform: uppercase; letter-spacing: 1.5px;
      border-bottom: 1px solid var(--panel-border); padding-bottom: 6px;
    }
    .panel h3 { margin: 10px 0 4px 0; font-size: 12px; color: var(--gold); }
    .hidden { display: none !important; }

    /* Character sheet */
    #char-sheet {
      top: 60px; left: 16px; width: 320px; max-height: calc((100vh - 220px) / var(--ui-scale));
      overflow-y: auto; font-size: 12px;
    }
    .stat-row { display: flex; justify-content: space-between; padding: 1px 0; }
    .stat-row .val { color: #fff; }
    .attr-row { display: flex; align-items: center; justify-content: space-between; padding: 2px 0; }
    .attr-row button {
      width: 22px; height: 20px; margin-left: 8px;
      background: #2a2a3e; color: var(--gold); border: 1px solid var(--panel-border);
      border-radius: 3px; cursor: pointer; font-weight: bold;
    }
    .attr-row button:hover { background: #3a3a55; }
    .attr-row button:disabled { opacity: 0.3; cursor: default; }

    /* Inventory (doll + tetris bag; the satchel + Build drawer anchor to it —
       the drawer hangs OUTSIDE the panel, so the panel itself must not clip:
       scrolling lives on the inner .inv-scroll wrapper instead). */
    #inventory {
      top: 56px; right: 16px; width: 660px; max-width: calc(94vw / var(--ui-scale)); font-size: 12px;
    }
    .skill-entry {
      border: 1px solid var(--panel-border); border-radius: 4px;
      padding: 8px; margin-bottom: 6px; cursor: default;
    }
    .skill-entry .name { font-weight: bold; color: #fff; }
    .skill-entry .tags { color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .skill-entry .desc { margin: 4px 0; color: var(--text); }
    .skill-entry .req { font-size: 11px; }
    .skill-entry .req.unmet { color: #d05050; }
    .skill-entry .req.met { color: #6fc06f; }
    .skill-entry .bind-btns { margin-top: 5px; display: flex; gap: 4px; flex-wrap: wrap; }
    .skill-entry .bind-btns button {
      background: #2a2a3e; color: var(--text); border: 1px solid var(--panel-border);
      border-radius: 3px; cursor: pointer; font-size: 10px; padding: 2px 7px;
    }
    .skill-entry .bind-btns button:hover:not(:disabled) { background: #3a3a55; color: #fff; }
    .skill-entry .bind-btns button:disabled { opacity: 0.3; cursor: default; }
    .skill-entry .bind-btns button.bound { background: #4a3c14; color: var(--gold); border-color: var(--gold); }
    .skill-entry.locked { opacity: 0.85; }

    /* Skill book tabs */
    .book-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
    .book-tabs button {
      flex: 1; background: #1a1a26; color: var(--text-dim);
      border: 1px solid var(--panel-border); border-radius: 4px 4px 0 0;
      padding: 6px 4px; cursor: pointer; font-size: 11px;
    }
    .book-tabs button:hover { color: var(--text); }
    .book-tabs button.active {
      background: #2a2a3e; color: var(--gold); border-bottom-color: var(--gold);
    }

    /* TUTORIAL GLOW — the class a live lesson pins on its NEXT CLICK (today:
       the Skill Gems tab while Mireille's gift waits unlearned, the BUILD
       flap while her flasks wait off the bar — ui/panels.ts reads the lesson
       from World.mireilleGiftLesson). Reusable by any future lesson surface.
       The animation origin outranks inline styles, so the pulse rides even
       inline-styled buttons untouched. */
    .tut-glow { animation: tut-glow 1.05s ease-in-out infinite alternate; }
    @keyframes tut-glow {
      from { box-shadow: 0 0 4px 1px rgba(200, 168, 255, 0.30); border-color: #7a5aa0; }
      to   { box-shadow: 0 0 15px 4px rgba(200, 168, 255, 0.85); border-color: #e0c8ff; color: #f0e4ff; }
    }

    /* Support gem sockets */
    .sockets { margin-top: 6px; display: flex; gap: 5px; flex-wrap: wrap; }
    .gem-chip {
      display: inline-flex; align-items: center; gap: 4px;
      border: 1px solid var(--panel-border); border-radius: 10px;
      padding: 1px 8px; font-size: 10px; background: rgba(255,255,255,0.04);
    }
    .gem-chip.empty { color: #555; border-style: dashed; }
    .gem-chip button {
      background: none; border: none; color: var(--gold); cursor: pointer;
      font-size: 10px; padding: 0 2px;
    }
    .gem-chip button:disabled { opacity: 0.3; cursor: default; }
    .gem-chip button:hover:not(:disabled) { color: #fff; }

    /* Passive tree */
    #passive-tree {
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: min(calc(92vh / var(--ui-scale)), 760px); max-width: calc(95vw / var(--ui-scale));
    }
    #passive-tree svg { width: 100%; height: auto; display: block; }
    .tree-node.available { cursor: pointer; }
    .tree-node.available:hover { stroke: #ffd700; stroke-width: 3; }

    /* Passive REALM tabs (data/passiveRealms.ts — the tree's constellations) */
    .realm-tabs { display: flex; gap: 4px; margin-bottom: 6px; }
    .realm-tabs .realm-tab {
      background: #1c1926; border: 1px solid #3c3556; border-bottom-width: 2px;
      border-radius: 5px 5px 0 0; padding: 4px 12px; color: #8a8678;
      font: inherit; font-size: 12px; cursor: pointer;
    }
    .realm-tabs .realm-tab:hover { color: #d8d4c8; }
    .realm-tabs .realm-tab.active {
      color: var(--realm-color, #c8a84b); border-bottom-color: var(--realm-color, #c8a84b);
      background: #242030;
    }

    /* Graft chips (bindable passive powers riding skills — panels graft bank) */
    .gem-chip.graft-chip { border-style: dashed; cursor: pointer; }
    .gem-chip.graft-chip.lifted { box-shadow: 0 0 6px #b8a2e8; color: #e6d8ff; }
    .graft-bank { margin: 2px 0 8px; }
    .graft-land {
      background: #2d2444; border: 1px dashed #8a68c8; border-radius: 4px;
      color: #cbb8f0; font: inherit; font-size: 10px; padding: 2px 8px; cursor: pointer;
    }
    .graft-land:hover { background: #3a2f56; }

    /* Choice-node popup (data/passiveChoices.ts deals, panels.openChoicePopup) */
    .choice-popup {
      position: fixed; z-index: 60; width: 300px; max-height: calc(62vh / var(--ui-scale)); overflow-y: auto;
      background: #17151f; border: 1px solid #6a54a0; border-radius: 6px;
      padding: 8px; box-shadow: 0 6px 24px rgba(0,0,0,0.6);
      font-size: 12px; color: #d8d4c8;
    }
    .choice-popup .choice-head {
      color: #cbb8f0; font-weight: bold; margin: 0 2px 7px;
      border-bottom: 1px solid #35304a; padding-bottom: 5px;
    }
    .choice-popup .choice-count { float: right; color: #8a8678; font-weight: normal; font-size: 11px; }
    .choice-popup .choice-opt {
      display: block; width: 100%; text-align: left; margin: 3px 0;
      background: #221e30; border: 1px solid #3c3556; border-radius: 4px;
      padding: 6px 8px; color: inherit; cursor: pointer; font: inherit;
    }
    .choice-popup .choice-opt:hover:not(:disabled) { border-color: #cbb8f0; background: #2b2540; }
    .choice-popup .choice-opt .opt-name { color: #e6d8ff; font-weight: bold; display: block; }
    .choice-popup .choice-opt .opt-desc { display: block; color: #b8b4a8; margin-top: 1px; }
    .choice-popup .choice-opt .opt-note { display: block; color: #8a8678; font-size: 11px; margin-top: 3px; }
    .choice-popup .choice-opt.chosen { border-color: #8a68c8; background: #2d2444; }
    .choice-popup .choice-opt.chosen .opt-note { color: #b8a2e8; }
    .choice-popup .choice-opt.locked { opacity: 0.55; cursor: default; }

    /* World map */
    #world-map {
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: min(calc(94vh / var(--ui-scale)), 860px); max-width: calc(96vw / var(--ui-scale));
    }
    #world-map .map-body { display: flex; gap: 10px; align-items: flex-start; }
    /* FIXED-SIZE map box: a square aspect-ratio (not height:auto) so the SVG never
       resizes to follow its viewBox. When a far-off zone is minted (a Crusade
       stronghold, a Caravan destination) the world bounds change shape, but the box
       stays put — the viewBox just scales the (now larger) world to FIT inside it
       (preserveAspectRatio "meet" = zoom out + centre). Prevents the panel from
       stretching and shoving the Map|Quests tabs off-screen. */
    #world-map .map-body svg { flex: 1 1 auto; min-width: 0; width: 100%; aspect-ratio: 1 / 1; height: auto; display: block; }
    #map-aside {
      flex: 0 0 196px; width: 196px; align-self: stretch; max-height: calc(62vh / var(--ui-scale)); overflow-y: auto;
      border-left: 1px solid var(--panel-border); padding-left: 10px;
      font: 11px Verdana; color: var(--text);
    }
    #map-aside .zi-zone { color: var(--gold); font-weight: bold; font-size: 12px; }
    #map-aside .zi-pin { color: #5ad8d8; font-size: 10px; font-weight: normal; cursor: pointer; }
    #map-aside .zi-hint { color: var(--text-dim); font-size: 10px; margin: 1px 0 6px; }
    #map-aside .zi-chips { display: flex; flex-wrap: wrap; gap: 3px; margin: 0 0 5px; }
    #map-aside .zi-chip {
      font-size: 9px; padding: 0 6px; line-height: 15px; white-space: nowrap;
      border: 1px solid #3a3a4e; border-radius: 8px; color: var(--text-dim);
    }
    #map-aside .zi-group { color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin: 9px 0 3px; }
    #map-aside .zi-row { display: flex; gap: 6px; align-items: baseline; margin: 2px 0; line-height: 1.3; }
    #map-aside .zi-icon { flex: 0 0 15px; text-align: center; }
    #map-aside .zi-txt { flex: 1 1 auto; min-width: 0; }
    #map-aside .zi-detail { color: var(--text-dim); }
    #map-aside .zi-empty { color: var(--text-dim); font-style: italic; margin-top: 6px; }
    .map-zoom-grp, .tree-zoom-grp { display: inline-flex; gap: 2px; vertical-align: middle; }
    .map-zoom, .tree-zoom {
      background: #2a2a3e; color: var(--gold); border: 1px solid var(--panel-border);
      border-radius: 3px; min-width: 22px; padding: 1px 5px; font: 11px Verdana; cursor: pointer;
    }
    .map-zoom:hover, .tree-zoom:hover { background: #3a3a55; }

    /* Class select */
    #class-select {
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 860px; max-width: calc(95vw / var(--ui-scale)); max-height: calc(90vh / var(--ui-scale)); overflow-y: auto;
      text-align: center;
    }
    #class-select h1 { color: var(--gold); font-size: 26px; letter-spacing: 3px; margin: 8px 0 2px 0; }
    #class-select .subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 16px; }
    .class-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: left; }
    .class-card {
      border: 1px solid var(--panel-border); border-radius: 6px; padding: 12px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      background: rgba(255,255,255,0.02);
    }
    .class-card:hover { border-color: var(--gold); background: rgba(200,168,75,0.07); }
    .class-card .cname { font-size: 15px; font-weight: bold; color: #fff; }
    .class-card .cdesc { font-size: 11px; color: var(--text-dim); margin: 6px 0; min-height: 42px; }
    .class-card .cattrs { font-size: 11px; color: var(--text); }
    .class-card .cskills { font-size: 10px; color: var(--gold); margin-top: 4px; }

    /* Account / unlock screen */
    #caravan-menu, #sail-menu, #vocation-menu, #salvage-menu, #oracle-menu, #vendor-menu, #merc-menu, #bestiary-menu {
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 420px; max-width: calc(92vw / var(--ui-scale)); max-height: calc(80vh / var(--ui-scale));
      overflow-y: auto; font-size: 12px;
    }
    #vocation-menu { width: 500px; }
    #merc-menu { width: 520px; }
    /* The station menus list whole bags — wider, taller. */
    #salvage-menu { width: 540px; max-height: calc(84vh / var(--ui-scale)); }
    #oracle-menu { width: 520px; max-height: calc(84vh / var(--ui-scale)); }
    #vendor-menu { width: 540px; max-height: calc(84vh / var(--ui-scale)); }
    /* The Tracker's book spreads two facing columns. */
    #bestiary-menu { width: 640px; max-height: calc(86vh / var(--ui-scale)); }
    #bestiary-menu .b-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; margin: 8px 0; }
    #bestiary-menu .b-row { display: flex; align-items: center; gap: 7px; padding: 3px 6px; border: 1px solid #2a2a3a; border-radius: 3px; cursor: pointer; background: rgba(16,16,24,0.6); }
    #bestiary-menu .b-row:hover { border-color: #8a86b8; }
    #bestiary-menu .b-row.sel { border-color: #c8a84b; }
    #bestiary-menu .b-row.dark { color: #55536a; cursor: default; }
    #bestiary-menu .b-bar { height: 3px; background: #26263a; border-radius: 2px; overflow: hidden; margin-top: 2px; }
    #bestiary-menu .b-bar i { display: block; height: 100%; background: #8ab06a; }
    #bestiary-menu .b-bar i.done { background: #e8c860; }
    /* THE GRIMOIRE STRIP — the Spectre binding slots at the open book. */
    #bestiary-menu .spec-slot {
      display: inline-flex; align-items: center; gap: 6px; margin: 2px 6px 2px 0;
      padding: 3px 8px; border: 1px dashed #4a3a5a; border-radius: 4px;
      font-size: 11px; background: rgba(24,20,34,0.55); min-height: 24px;
    }
    #bestiary-menu .spec-slot .empty { color: #6a6478; font-size: 10px; }
    #bestiary-menu .b-row.attunable { cursor: grab; }
    /* THE DRAG FABRIC (ui/dnd.ts) — ghost + target affordances, shared by
       every consumer panel; the fabric toggles these, panels only declare
       data-drag / data-drop. */
    .dnd-ghost {
      position: fixed; left: 0; top: 0; z-index: 100000; pointer-events: none;
      display: flex; align-items: center; gap: 6px; padding: 3px 9px;
      background: rgba(24,20,34,0.94); border: 1px solid var(--gold);
      border-radius: 5px; font-size: 11px; color: #e8e4d8;
      box-shadow: 0 4px 14px rgba(0,0,0,0.55);
    }
    .dnd-ghost.miss { border-color: #6a6478; opacity: 0.75; }
    [data-drop].dnd-can { outline: 1px dashed rgba(200,168,75,0.55); outline-offset: 1px; }
    [data-drop].dnd-over { outline: 2px solid var(--gold); outline-offset: 1px; background: rgba(200,168,75,0.12); }
    /* The element a payload lifted FROM — "this is what's in the air". */
    [data-drag].dnd-src { opacity: 0.55; outline: 2px dashed rgba(232,224,208,0.8); outline-offset: 1px; }
    /* The world canvas takes drops (drag gear out = discard at your feet),
       but a full-viewport outline would be absurd — there, the ghost chip's
       lit/miss border IS the affordance. */
    #game.dnd-can, #game.dnd-over { outline: none; background: none; }
    body.dnd-active, body.dnd-active * { cursor: grabbing !important; }
    #account-screen {
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 820px; max-width: calc(95vw / var(--ui-scale)); max-height: calc(90vh / var(--ui-scale));
      overflow: hidden; display: flex; flex-direction: column;
      text-align: center;
    }
    /* Frozen Vault header (title + Account Level / Credits / Lifetime) always
       visible; the unlock grids scroll beneath it. */
    #account-screen .vault-head { flex: 0 0 auto; background: var(--panel-bg); }
    #account-screen .vault-body { flex: 1 1 auto; min-height: 0; overflow-y: auto; }
    #account-screen h1 { color: var(--gold); font-size: 22px; letter-spacing: 2px; margin: 4px 0; }
    #account-screen .acct-head { color: var(--text); font-size: 13px; margin-bottom: 14px; }
    #account-screen .acct-head b { color: var(--gold); }
    .unlock-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: left; }
    .unlock-card {
      border: 1px solid var(--panel-border); border-radius: 6px; padding: 10px;
      background: rgba(255,255,255,0.02); display: flex; flex-direction: column;
    }
    .unlock-card.owned { opacity: 0.5; }
    .unlock-card .uname { font-size: 13px; font-weight: bold; color: #fff; }
    .unlock-card .ukind { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
    .unlock-card .udesc { font-size: 11px; color: var(--text-dim); margin: 5px 0; flex: 1; }
    .unlock-card button {
      background: #2a2a3e; color: var(--gold); border: 1px solid var(--gold);
      border-radius: 3px; padding: 4px 8px; font-size: 11px; cursor: pointer;
    }
    .unlock-card button:hover:not(:disabled) { background: #3a3a55; }
    .unlock-card button:disabled { opacity: 0.4; cursor: default; border-color: var(--panel-border); color: var(--text-dim); }
    #account-screen .acct-btns { margin-top: 14px; }
    #account-screen .acct-btns button {
      background: #2a2a3e; color: var(--gold); border: 1px solid var(--gold);
      border-radius: 4px; padding: 8px 24px; font-size: 14px; cursor: pointer; margin: 12px 6px 0 6px;
    }
    /* The death screen's two buttons (#unlocks-btn, #restart-btn) both ride the
       shared #death-screen button base + the cohesive gradient rule below. */
    #death-screen button { margin: 12px 6px 0 6px; }
    .class-card.locked { cursor: pointer; }
    .class-card .class-lock { margin-top: 6px; font-size: 11px; font-weight: bold; color: var(--gold); }

    /* Escape menu + keybinds */
    #escape-menu {
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 460px; max-width: calc(92vw / var(--ui-scale)); max-height: calc(88vh / var(--ui-scale)); overflow-y: auto; text-align: center;
    }
    #escape-menu h1 { color: var(--gold); font-size: 22px; letter-spacing: 2px; margin: 4px 0 10px 0; }
    #escape-menu .esc-btns { display: flex; flex-direction: column; gap: 8px; align-items: center; margin-top: 10px; }
    #escape-menu .esc-btns button {
      width: 240px; background: #2a2a3e; color: var(--gold); border: 1px solid var(--gold);
      border-radius: 4px; padding: 9px 0; font-size: 14px; cursor: pointer;
    }
    #escape-menu .esc-btns button:hover { background: #3a3a55; }
    #escape-menu .rebind-list { text-align: left; margin: 8px 0; }
    .rebind-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 6px; border-bottom: 1px solid var(--panel-border);
    }
    .rebind-row span { font-size: 12px; color: var(--text); }
    .rebind-row button {
      min-width: 64px; background: #2a2a3e; color: var(--gold); border: 1px solid var(--panel-border);
      border-radius: 3px; padding: 3px 8px; font-size: 11px; cursor: pointer; text-transform: uppercase;
    }
    .rebind-row button:hover { background: #3a3a55; border-color: var(--gold); }

    /* Start menu (launch) — reuses the escape-menu button styling */
    #start-menu {
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 460px; max-width: calc(92vw / var(--ui-scale)); text-align: center; padding: 34px;
    }
    #start-menu h1 { color: var(--gold); font-size: 26px; letter-spacing: 3px; margin: 0 0 8px 0; }
    #start-menu .acct-head { color: var(--text); font-size: 13px; margin-bottom: 14px; }
    #start-menu .acct-head b { color: var(--gold); }
    #start-menu .esc-btns { display: flex; flex-direction: column; gap: 8px; align-items: center; }
    #start-menu .esc-btns button {
      width: 260px; background: #2a2a3e; color: var(--gold); border: 1px solid var(--gold);
      border-radius: 4px; padding: 10px 0; font-size: 14px; cursor: pointer;
    }
    #start-menu .esc-btns button:hover:not(:disabled) { background: #3a3a55; }
    #start-menu .esc-btns button:disabled { opacity: 0.4; cursor: default; border-color: var(--panel-border); color: var(--text-dim); }

    /* Floating tooltip (outside .panel so panel display rules don't hide it) */
    .tooltip {
      position: fixed; z-index: 10000; max-width: 280px; pointer-events: none;
      background: rgba(12,12,18,0.97); border: 1px solid var(--gold); border-radius: 4px;
      padding: 9px 11px; font-size: 11px; line-height: 1.4; box-shadow: 0 4px 16px rgba(0,0,0,0.8);
    }
    .tooltip.hidden { display: none; }
    .tt-title { color: var(--gold); font-weight: bold; margin-bottom: 5px; }
    .tt-desc { color: var(--text); }
    .tt-meta { color: var(--text-dim); font-size: 10px; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--panel-border); }
    .unlock-card.uowned { opacity: 0.5; }
    .vault-sub { color: var(--text-dim); font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
      margin: 14px 0 6px 0; border-bottom: 1px solid var(--panel-border); padding-bottom: 4px; }

    /* Expedition Setup (per-run package configuration) */
    #expedition-setup {
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 720px; max-width: calc(95vw / var(--ui-scale)); max-height: calc(92vh / var(--ui-scale)); overflow-y: auto; text-align: center;
    }
    #expedition-setup h1 { color: var(--gold); font-size: 24px; letter-spacing: 2px; margin: 4px 0 8px 0; }
    #expedition-setup .acct-head { color: var(--text); font-size: 13px; margin-bottom: 12px; }
    #expedition-setup .acct-head b { color: var(--gold); }
    .mix-label { font-size: 11px; color: var(--text-dim); text-align: left; margin-bottom: 4px; }
    .mix-bar { display: flex; height: 22px; border-radius: 5px; overflow: hidden; border: 1px solid var(--panel-border); margin-bottom: 14px; background: #14141c; }
    .mix-seg { display: flex; align-items: center; justify-content: center; font-size: 10px; color: #0a0a0e; font-weight: bold; white-space: nowrap; overflow: hidden; min-width: 0; }
    .mix-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 11px; }
    .exped-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; text-align: left; }
    .exped-card { border: 1px solid var(--panel-border); border-radius: 6px; padding: 10px; background: rgba(255,255,255,0.02); transition: opacity 0.15s; }
    .exped-card.exped-off { opacity: 0.5; }
    .exped-head { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .exped-head input { width: 15px; height: 15px; accent-color: var(--gold); }
    .exped-name { font-size: 14px; font-weight: bold; }
    .exped-blurb { font-size: 11px; color: var(--text-dim); margin: 5px 0; min-height: 28px; }
    .exped-always { font-size: 11px; color: #6fc06f; }
    .exped-lock { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
    .slider-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 11px; color: var(--text); }
    .slider-row > span:first-child { width: 62px; color: var(--text-dim); }
    .slider-row .sv { width: 42px; text-align: right; color: var(--gold); font-weight: bold; }
    .slider-row input[type=range] {
      flex: 1; -webkit-appearance: none; appearance: none; height: 5px; border-radius: 3px;
      background: #2a2a3e; outline: none; cursor: pointer;
    }
    .slider-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: var(--gold); border: 1px solid #0a0a0e; cursor: pointer;
    }
    .slider-row input[type=range]::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%; background: var(--gold); border: 1px solid #0a0a0e; cursor: pointer;
    }
    .slider-row input[type=range]:disabled { opacity: 0.4; cursor: default; }
    #expedition-setup .acct-btns { margin-top: 14px; }
    #expedition-setup .acct-btns button {
      background: #2a2a3e; color: var(--gold); border: 1px solid var(--gold);
      border-radius: 4px; padding: 8px 24px; font-size: 14px; cursor: pointer; margin: 0 6px;
    }
    #expedition-setup .acct-btns button:hover { background: #3a3a55; }
    #expedition-setup #exped-begin { background: #2c3a2c; border-color: #6fc06f; color: #b6f0b6; }
    #expedition-setup #exped-begin:hover { background: #3a4f3a; }

    /* Death screen */
    #death-screen {
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center; padding: 30px 50px;
    }
    #death-screen h1 { color: #c03030; letter-spacing: 4px; }
    #death-screen button {
      background: #2a2a3e; color: var(--gold); border: 1px solid var(--gold);
      border-radius: 4px; padding: 8px 24px; font-size: 14px; cursor: pointer; margin-top: 12px;
    }
    #death-screen button:hover { background: #3a3a55; }

    /* ---- COHESIVE BUTTON GRAPHIC across every menu/panel. Equal specificity to
       the per-panel rules above, declared LATER so it wins; per-panel width /
       padding / margin are left untouched, so only the graphic is unified. ---- */
    #start-menu .esc-btns button, #escape-menu .esc-btns button,
    #account-screen .acct-btns button, #expedition-setup .acct-btns button,
    #class-select .acct-btns button, #death-screen button {
      background: linear-gradient(180deg, #30304a, #232338);
      color: var(--gold); border: 1px solid var(--gold); border-radius: 5px;
      font-size: 14px; font-family: inherit; cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.45);
      transition: background 0.15s, box-shadow 0.15s, transform 0.05s;
    }
    #start-menu .esc-btns button:hover:not(:disabled), #escape-menu .esc-btns button:hover:not(:disabled),
    #account-screen .acct-btns button:hover:not(:disabled), #expedition-setup .acct-btns button:hover:not(:disabled),
    #class-select .acct-btns button:hover:not(:disabled), #death-screen button:hover:not(:disabled) {
      background: linear-gradient(180deg, #3d3d5c, #2b2b46);
      box-shadow: 0 0 9px rgba(200,168,75,0.4);
    }
    #start-menu .esc-btns button:active:not(:disabled), #escape-menu .esc-btns button:active:not(:disabled),
    #account-screen .acct-btns button:active:not(:disabled), #expedition-setup .acct-btns button:active:not(:disabled),
    #class-select .acct-btns button:active:not(:disabled), #death-screen button:active:not(:disabled) {
      transform: translateY(1px);
    }
    #start-menu .esc-btns button:disabled, #escape-menu .esc-btns button:disabled,
    #account-screen .acct-btns button:disabled, #expedition-setup .acct-btns button:disabled,
    #class-select .acct-btns button:disabled {
      opacity: 0.4; cursor: default; border-color: var(--panel-border); color: var(--text-dim); box-shadow: none;
    }

    #hint-bar {
      position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: var(--text-dim); pointer-events: none;
      text-shadow: 0 1px 2px #000;
    }
  </style>
</head>
<body>
  <!-- The world itself is a drop target: gear and gems dragged out of the
       panels land at your feet (ui/dnd.ts 'ground'). -->
  <canvas id="game" data-drop="ground"></canvas>
  <div id="class-select" class="panel hidden"></div>
  <div id="char-sheet" class="panel hidden"></div>
  <div id="inventory" class="panel hidden"></div>
  <div id="passive-tree" class="panel hidden"></div>
  <div id="world-map" class="panel hidden"></div>
  <div id="caravan-menu" class="panel hidden"></div>
  <div id="sail-menu" class="panel hidden"></div>
  <div id="vocation-menu" class="panel hidden"></div>
  <div id="merc-menu" class="panel hidden"></div>
  <div id="salvage-menu" class="panel hidden"></div>
  <div id="oracle-menu" class="panel hidden"></div>
  <div id="bestiary-menu" class="panel hidden"></div>
  <div id="vendor-menu" class="panel hidden"></div>
  <div id="borough-menu" class="panel hidden"></div>
  <div id="death-screen" class="panel hidden"></div>
  <div id="account-screen" class="panel hidden"></div>
  <div id="escape-menu" class="panel hidden"></div>
  <div id="start-menu" class="panel hidden"></div>
  <div id="expedition-setup" class="panel hidden"></div>
  <div id="tooltip" class="tooltip hidden"></div>
  <div id="hint-bar">[WASD] move &nbsp; [LMB/RMB/1-6] skills &nbsp; [C] character &nbsp; [I] inventory &nbsp; [P] passive tree &nbsp; [M] world map &nbsp; [Esc] menu</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
